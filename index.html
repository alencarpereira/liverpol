<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro - Estatística Futebol</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Abertura do Card (Faltava isso) -->
    <div class="card">
        <h2>Estatística Pura</h2>

        <div class="input-group">
            <label>Liga / Competição:</label>
            <select id="mediaLiga">
                <option value="3.17">UEFA Champions League (3.17)</option>
                <option value="2.82">UEFA Conference League (2.82)</option>
                <option value="3.24">Holandês - Eredivisie (3.24)</option>
                <option value="3.14">Bundesliga (3.14)</option>
                <option value="2.68">Ligue 1 (2.68)</option>
                <option value="2.85">Premier League (2.85)</option>
                <option value="2.44">Seria A (liga italiana) (2.44)</option>
                <option value="2.60">Brasileirão Série A (2.60)</option>
                <option value="2.47">Copa Sul-Americana (2.47)</option>
                <option value="2.40">Copa Libertadores (2.40)</option>
                <option value="2.22">Brasileirão Série B (2.22)</option>
                <option value="3.13">Arábia Saudita - Pro League (3.13)</option>
                <option value="2.45">Inglaterra - Championship (2.45)</option>
                <option value="2.60">Espanha - La Liga 2 (2.60)</option>
                <option value="3.20">Holandês - Everste Divisie (3.20)</option>
                <option value="3.10">Superliga Dinamarquesa (3.10)</option>
                <option value="2.72">Campeonato Português (2.72)</option>
                <option value="2.33">Campeonato Uruguaio (2.33)</option>
                <option value="2.03">Campeonato Argentino (2.03)</option>
                <option value="2.55">Campeonato Equatoriano (2.55)</option>
                <option value="1.77">Campeonato Argentino Serie B (1.77)</option>
                <option value="2.17">Campeonato Paraguaio (2.17)</option>
                <option value="2.28">Campeonato Colombiano (2.28)</option>
                <option value="2.99">Campeonato Major League Soccer (MSL) (2.99)</option>
                <option value="2.50">Outras / Geral (2.50)</option>
            </select>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Gols Marcados Casa (L5):</label>
                <input type="number" id="gpCasa" step="0.01" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Gols Sofridos Casa (L5):</label>
                <input type="number" id="gsCasa" step="0.01" placeholder="0.0">
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Gols Marcados Fora (L5):</label>
                <input type="number" id="gpFora" step="0.01" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Gols Sofridos Fora (L5):</label>
                <input type="number" id="gsFora" step="0.01" placeholder="0.0">
            </div>
        </div>

        <button onclick="calcular()">CALCULAR PROBABILIDADE</button>
        <!-- Novo botão de limpar -->
        <button onclick="limparCampos()"
            style="background: transparent; color: #adb5bd; border: 1px solid #0f3460; margin-top: 10px;">LIMPAR</button>


        <div id="output" class="results" style="display:none; margin-top: 20px; text-align: center;">
            <span id="labelVeredito" style="font-size: 0.8em; color: #adb5bd; display: block;">SUGESTÃO
                MATEMÁTICA:</span>
            <div id="resultadoVeredito" style="font-weight: bold; font-size: 1.8em; margin: 10px 0;">--</div>
            <span id="probabilidadeFinal" style="font-size: 1.1em; font-weight: bold;">--</span>
        </div>

    </div> <!-- Fechamento do Card -->

    <script src="script.js"></script>
</body>

</html>
